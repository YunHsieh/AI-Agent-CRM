name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install Poetry and uv
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          pip install uv
          $HOME/.local/bin/poetry config virtualenvs.installer uv

      - name: Install dependencies
        run: $HOME/.local/bin/poetry install

      - name: Start services
        env:
          OPENAI_API_KEY: test
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
          OTEL_SERVICE_NAME: "ai-agent-crm-dev"
          AGENT_URL: http://localhost
          TOKENIZERS_PARALLELISM: "false"
          MILVUS_URI: http://localhost:19530
        run: |
          docker compose up -d
          sleep 15

      - name: Run tests
        env:
          OPENAI_API_KEY: test
          MILVUS_URI: http://localhost:19530
        run: |
          $HOME/.local/bin/poetry run pytest tests/
