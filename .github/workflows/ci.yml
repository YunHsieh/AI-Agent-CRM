name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install and configure uv
        run: |
          pip install uv
          uv venv

      - name: Install dependencies
        run: uv pip sync

      - name: Start services
        env:
          OPENAI_API_KEY: test
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
          OTEL_SERVICE_NAME: "ai-agent-crm-dev"
          AGENT_URL: http://localhost
          TOKENIZERS_PARALLELISM: "false"
          MILVUS_URI: http://localhost:19530
        run: |
          docker compose up -d
          sleep 15

      - name: Run tests
        env:
          OPENAI_API_KEY: test
          MILVUS_URI: http://localhost:19530
        run: .venv/bin/pytest tests/
